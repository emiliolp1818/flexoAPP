<header class="header">
  <div class="header-left">
    <img src="/logo.png" class="logo" alt="Flexo Spring Logo">
    <h1 class="title">Flexo Spring</h1>
  </div>

  <div class="header-right">
    @if (authService.currentUser(); as user) {
      <div class="user-info">
        <span class="username">{{ user.nombre }} {{ user.apellido }}</span>
        <div class="user-photo-container">
          <img 
            [src]="getUserPhotoUrl(user)" 
            [alt]="user.nombre + ' ' + user.apellido" 
            class="user-photo" 
            (error)="onImageError($event)"
            (click)="toggleUserMenu()"
          />
          <div class="photo-upload-overlay" (click)="openPhotoUpload()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
              <path d="M12 2C13.1 2 14 2.9 14 4C14 5.1 13.1 6 12 6C10.9 6 10 5.1 10 4C10 2.9 10.9 2 12 2ZM21 9V7L15 1H5C3.89 1 3 1.89 3 3V21C3 22.1 3.89 23 5 23H19C20.1 23 21 22.1 21 21V9M19 21H5V3H13V9H19V21Z"/>
            </svg>
          </div>
        </div>
      </div>
      
      <div class="user-menu" [class.active]="showUserMenu()">
        <div class="dropdown">
          <button 
            class="dropdown-toggle" 
            (click)="toggleUserMenu()"
            [class.active]="showUserMenu()"
            aria-label="Menú de usuario"
          >
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M7 10l5 5 5-5z"/>
            </svg>
          </button>
          <ul class="dropdown-menu" [class.show]="showUserMenu()">
            <li class="user-profile-header">
              <div class="profile-info">
                <img [src]="getUserPhotoUrl(user)" class="profile-avatar" />
                <div class="profile-details">
                  <span class="profile-name">{{ user.nombre }} {{ user.apellido }}</span>
                  <span class="profile-role">{{ user.rol }}</span>
                </div>
              </div>
            </li>
            <li class="menu-divider"></li>
            <li>
              <button (click)="openProfile()" class="menu-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
                Mi Perfil
              </button>
            </li>
            <li>
              <button (click)="openPhotoUpload()" class="menu-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
                </svg>
                Cambiar Foto
              </button>
            </li>
            <li>
              <button (click)="openSettings()" class="menu-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.82,11.69,4.82,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
                </svg>
                Configuración
              </button>
            </li>
            <li class="menu-divider"></li>
            <li>
              <button (click)="onLogout()" class="menu-item logout">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.59L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
                </svg>
                Cerrar Sesión
              </button>
            </li>
          </ul>
        </div>
      </div>
    }
  </div>

  <!-- Input oculto para subir fotos -->
  <input 
    type="file" 
    #photoInput 
    accept="image/*" 
    (change)="onPhotoSelected($event)"
    style="display: none"
  />
</header>
