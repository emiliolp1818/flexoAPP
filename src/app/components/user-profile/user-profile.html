<div class="profile-container">
  <div class="profile-header">
    <div class="profile-avatar-section">
      <img [src]="getUserPhotoUrl()" alt="Foto de perfil" class="profile-avatar-large">
      <h1>Mi Perfil</h1>
    </div>
    
    @if (!isEditing()) {
      <button (click)="toggleEdit()" class="edit-button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
        </svg>
        Editar Perfil
      </button>
    }
  </div>

  <div class="profile-content">
    <div class="profile-card">
      <h2>Información Personal</h2>
      
      <div class="form-grid">
        <div class="form-group">
          <label for="nombre">Nombre</label>
          @if (isEditing()) {
            <input 
              type="text" 
              id="nombre" 
              [(ngModel)]="profileData.nombre"
              class="form-input"
              placeholder="Ingresa tu nombre"
            >
          } @else {
            <div class="form-display">{{ profileData.nombre }}</div>
          }
        </div>

        <div class="form-group">
          <label for="apellido">Apellido</label>
          @if (isEditing()) {
            <input 
              type="text" 
              id="apellido" 
              [(ngModel)]="profileData.apellido"
              class="form-input"
              placeholder="Ingresa tu apellido"
            >
          } @else {
            <div class="form-display">{{ profileData.apellido }}</div>
          }
        </div>

        <div class="form-group">
          <label for="rol">Rol</label>
          @if (isEditing()) {
            <select 
              id="rol" 
              [(ngModel)]="profileData.rol"
              class="form-input"
            >
              <option value="usuario">Usuario</option>
              <option value="admin">Administrador</option>
              <option value="supervisor">Supervisor</option>
            </select>
          } @else {
            <div class="form-display role-badge">{{ profileData.rol }}</div>
          }
        </div>

        <div class="form-group">
          <label>Código de Usuario</label>
          <div class="form-display readonly">{{ authService.currentUser()?.codigoUsuario }}</div>
        </div>
      </div>

      @if (isEditing()) {
        <div class="form-actions">
          <button 
            (click)="saveProfile()" 
            [disabled]="isSaving()"
            class="save-button"
          >
            @if (isSaving()) {
              <div class="loading-spinner"></div>
              Guardando...
            } @else {
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
              </svg>
              Guardar Cambios
            }
          </button>
          
          <button 
            (click)="cancelEdit()" 
            [disabled]="isSaving()"
            class="cancel-button"
          >
            Cancelar
          </button>
        </div>
      }
    </div>
  </div>
</div>
