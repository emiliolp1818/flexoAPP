<div class="login-container">
  <div class="login-card">
    <div class="logo-section">
      <img src="/logo.png" alt="Flexo Spring Logo" class="company-logo">
      <h1 class="company-name">Flexo Spring</h1>
      <p class="company-slogan">Líderes en empaques flexibles</p>
    </div>
    
    <div class="login-form-section">
      <h2 class="login-title">Iniciar Sesión</h2>
      
      @if (errorMessage()) {
        <div class="error-message">
          {{ errorMessage() }}
        </div>
      }
      
      <form (ngSubmit)="onLogin()" #loginForm="ngForm" class="login-form">
        <div class="form-group">
          <label for="codigoUsuario">Código de Usuario</label>
          <input 
            type="text" 
            id="codigoUsuario" 
            name="codigoUsuario"
            [(ngModel)]="loginData.codigoUsuario"
            placeholder="Ingrese su código de usuario" 
            required 
            class="form-input"
            [class.error]="!loginForm.form.get('codigoUsuario')?.valid && loginForm.form.get('codigoUsuario')?.touched"
          />
        </div>

        <div class="form-group">
          <label for="contrasena">Contraseña</label>
          <div class="password-input-container">
            <input 
              [type]="showPassword() ? 'text' : 'password'" 
              id="contrasena" 
              name="contrasena"
              [(ngModel)]="loginData.contrasena"
              placeholder="••••••••" 
              required 
              class="form-input password-input"
              [class.error]="!loginForm.form.get('contrasena')?.valid && loginForm.form.get('contrasena')?.touched"
            />
            <button 
              type="button" 
              class="password-toggle"
              (click)="togglePasswordVisibility()"
              [attr.aria-label]="showPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'"
            >
              @if (showPassword()) {
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              } @else {
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              }
            </button>
          </div>
        </div>

        <button 
          type="submit" 
          class="login-button"
          [disabled]="!loginForm.form.valid || isLoading()"
        >
          @if (isLoading()) {
            <span class="loading-spinner"></span>
            Iniciando sesión...
          } @else {
            Iniciar Sesión
          }
        </button>
      </form>
      
      <div class="dev-info">
        <h4>🔧 Modo Desarrollo</h4>
        <p>Backend no disponible. Credenciales de prueba:</p>
        <div class="dev-credentials">
          <span><strong>admin</strong> / admin123</span>
          <span><strong>user</strong> / user123</span>
          <span><strong>test</strong> / test123</span>
        </div>
      </div>
      
      <div class="login-help">
        <p>¿Olvidaste tu contraseña? <a href="#" class="help-link">Contacta al administrador</a></p>
      </div>
    </div>
  </div>
</div>
